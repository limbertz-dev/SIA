services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bienestar_estudiantil_3.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brisa_network

  backend:
    build:
      context: ./BRISA-Backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "${BACKEND_PORT:?BACKEND_PORT is required}"
    volumes:
      - ./BRISA-Backend:/app
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      ENV: ${APP_ENV:?APP_ENV is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-brisa-backend}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn run:app --host 0.0.0.0 --port ${BACKEND_PORT:?BACKEND_PORT is required}
    networks:
      - brisa_network

  frontend:
    build:
      context: ./BRISA-Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: always
    expose:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}"
    environment:
      VITE_API_URL: ${VITE_API_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
    depends_on:
      - backend
    networks:
      - brisa_network

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: always
    expose:
      - "9090"
    volumes:
      - ./BRISA-Observability/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
      - tempo
    networks:
      - brisa_network

  tempo:
    image: grafana/tempo:2.7.2
    restart: always
    expose:
      - "3200"
      - "4317"
      - "4318"
    volumes:
      - ./BRISA-Observability/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - brisa_network

  grafana:
    image: grafana/grafana:11.3.1
    restart: always
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-false}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GF_AUTH_DISABLE_LOGIN_FORM:-false}
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: ${GF_USERS_AUTO_ASSIGN_ORG_ROLE:-Viewer}
      GF_FEATURE_TOGGLES_ENABLE: ${GF_FEATURE_TOGGLES_ENABLE:-traceqlEditor}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./BRISA-Observability/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - tempo
    networks:
      - brisa_network

networks:
  brisa_network:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  tempo_data:
  grafana_data:
